{{ $data := hugo.Data.topnav.dnet }}
{{ if $data }}
<nav class="topnav">
    <div class="container">
        <ul>
            {{ $current := .RelPermalink }}
            {{ range $data }}
                <li class="{{ if .children }}has-dropdown{{ end }}">
                    <a href="{{ .url | relURL }}" class="{{ if eq $current .url }}active{{ end }}">{{ .name }}</a>
                    {{ if .children }}
                        <ul class="dropdown">
                            {{ range .children }}
                                <li><a href="{{ .url | relURL }}">{{ .name }}</a></li>
                            {{ end }}
                        </ul>
                    {{ end }}
                </li>
            {{ end }}
        </ul>
    </div>
</nav>
{{ end }}
