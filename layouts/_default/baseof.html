<!DOCTYPE html>
<html lang="en">

<head>
	<meta name="page-kind" content="{{ .Kind }}">
	<meta name="page-type" content="{{ .Type }}">
	<meta name="page-section" content="{{ .Section }}">
	<meta charset="UTF-8">
	<title>{{ .Title }}</title>
	{{ if ne .Type "root" }}
	<link rel="stylesheet" href="{{ "css/style.css" | relURL}}">
	{{ with .OutputFormats.Get "RSS" }}
	<link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }} RSS" href="{{ .RelPermalink }}">
	{{ end }}

	<!-- KaTeX -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
	<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
	<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"
		onload="renderMathInElement(document.body);"></script>
	{{ end }}
	{{ block "head_extra" . }}{{ end }}
</head>

<body data-page-type="{{ .Type }}" date-page-section="{{ .Section }}" data-page-path="{{ .RelPermalink }}">
	<!-- 副导航 -->
	{{ partial "topnav.html" . }}

	{{ partial "great-indexer.html" . }}
	<script defer src="{{ "/js/great-indexer.js" | relURL }}"></script>

	<script src="/js/code-lang.js"></script>

	<!-- 主体内容 -->
	{{ block "main" . }}{{ end }}

	{{ partial "mermaid.html" . }}

	<!-- 页脚 -->
	{{ partial "footer.html" . }}
</body>

</html>
